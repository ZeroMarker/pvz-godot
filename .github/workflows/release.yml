name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  GODOT_VERSION: "4.2.2"
  EXPORT_NAME: "pvz-godot"

jobs:
  export:
    name: Export ${{ matrix.platform }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows
            preset: Windows
            export_path: build/windows/pvz-godot.exe
            artifact: windows
          - platform: Linux
            preset: Linux
            export_path: build/linux/pvz-godot.x86_64
            artifact: linux
          - platform: macOS
            preset: macOS
            export_path: build/macos/pvz-godot.zip
            artifact: macos
          - platform: Web
            preset: Web
            export_path: build/web/index.html
            artifact: web

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Export preset
        env:
          PRESET: ${{ matrix.preset }}
          EXPORT_PATH: ${{ matrix.export_path }}
        run: |
          mkdir -p "$(dirname "$EXPORT_PATH")"
          godot --headless --path . --export-release "$PRESET" "$EXPORT_PATH"

      - name: Package export
        env:
          PLATFORM: ${{ matrix.platform }}
          EXPORT_PATH: ${{ matrix.export_path }}
          ARCHIVE_PATH: dist/${{ env.EXPORT_NAME }}-${{ matrix.artifact }}.zip
        run: |
          mkdir -p dist
          if [ "$PLATFORM" = "macOS" ]; then
            cp "$EXPORT_PATH" "$ARCHIVE_PATH"
          else
            export_dir=$(dirname "$EXPORT_PATH")
            archive_path="$GITHUB_WORKSPACE/$ARCHIVE_PATH"
            cd "$export_dir"
            zip -r "$archive_path" .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-${{ matrix.artifact }}
          path: dist/${{ env.EXPORT_NAME }}-${{ matrix.artifact }}.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: export
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.zip
